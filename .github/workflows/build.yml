name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode Keystore (if provided)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            # 将 keystore 移动到 app 目录，以便 Gradle 签名配置能找到
            mkdir -p app
            mv keystore.jks app/keystore.jks
            echo "CUSTOM_KEYSTORE=true" >> $GITHUB_ENV
            echo "Custom keystore decoded and moved to app/keystore.jks"
          else
            echo "CUSTOM_KEYSTORE=false" >> $GITHUB_ENV
            echo "No custom keystore provided, will build debug APK"
          fi

      - name: Create local.properties (dummy, not used for API Key)
        run: |
          echo "MAPS_API_KEY=${{ secrets.AMAP_API_KEY }}" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: |
          if [ "$CUSTOM_KEYSTORE" = "true" ]; then
            echo "Building release APK with custom keystore"
            ./gradlew assembleRelease --stacktrace
          else
            echo "Building debug APK (no custom keystore)"
            ./gradlew assembleDebug --stacktrace
          fi
        env:
          KEYSTORE_PATH: app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ env.CUSTOM_KEYSTORE == 'true' && 'release' || 'debug' }}
          path: app/build/outputs/apk/${{ env.CUSTOM_KEYSTORE == 'true' && 'release' || 'debug' }}/*.apk